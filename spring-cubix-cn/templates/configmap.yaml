apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spring-cubix-cn.fullname" . }}-config
  labels:
    {{- include "spring-cubix-cn.labels" . | nindent 4 }}
data:
  application.properties: |-
    spring.main.banner-mode=off
    target.api.url=http://appb:8080
    spring.application.name=appa
    management.tracing.enabled=true
    management.tracing.sampling.probability=1.0
    management.otlp.tracing.endpoint=http://tempo.monitoring.svc.cluster.local:4318/v1/traces