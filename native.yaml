loggingMode: stdout

image:
  repository: quay.io/drsylent/cubix/block6v2/homework
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "springboot3native"

ingress:
  enabled: true
  hosts:
    - host: other.cubix.localhost
      paths:
        - path: /
          pathType: Prefix

env:
- name: SERVER_TOMCAT_THREADS_MAX
  value: 50
- name: MANAGEMENT_TRACING_ENABLED
  value: "true"
- name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
  value: "1.0"
- name: MANAGEMENT_OTLP_TRACING_ENDPOINT
  value: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"  

resources:
  limits:
    cpu: 1000m
    memory: 100Mi
  requests:
    cpu: 100m
    memory: 100Mi
